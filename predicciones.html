<style>
:root {
  --gold:#D4A017;--bg:#060610;--s2:#111120;
  --brd:rgba(212,160,23,.15);--txt:#E4DCC8;--muted:#7070A0;--dim:#404060;
  --green:#22C55E;--red:#EF4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;padding:20px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,48px);letter-spacing:3px;color:var(--gold);text-align:center;margin-bottom:4px;}
.sub{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:24px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;justify-content:center;}
.filt{background:var(--s2);border:1px solid var(--brd);border-radius:20px;padding:5px 14px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .18s;}
.filt.on,.filt:hover{border-color:var(--gold);color:var(--gold);}
.search-wrap{display:flex;justify-content:center;margin-bottom:20px;}
.search-inp{background:var(--s2);border:1px solid var(--brd);border-radius:6px;padding:8px 14px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-size:13px;outline:none;width:100%;max-width:300px;transition:border-color .18s;}
.search-inp:focus{border-color:var(--gold);}
.search-inp::placeholder{color:var(--dim);}
.match-block{margin-bottom:24px;}
.match-header{background:linear-gradient(135deg,var(--s2),rgba(212,160,23,.06));border:1px solid var(--brd);border-left:3px solid var(--gold);border-radius:4px 4px 0 0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.match-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#fff;}
.match-meta{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);letter-spacing:1px;}
.match-result{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);letter-spacing:2px;}
.preds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));border:1px solid var(--brd);border-top:none;border-radius:0 0 4px 4px;overflow:hidden;}
.pred-cell{padding:8px 12px;border-right:1px solid var(--brd);border-bottom:1px solid var(--brd);display:flex;flex-direction:column;gap:2px;}
.pred-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pred-score{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--txt);letter-spacing:2px;}
.pred-score.exact{color:var(--green);}
.pred-score.correct{color:var(--gold);}
.pred-score.wrong{color:var(--red);}
.pred-chip{font-size:8px;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
.pred-chip.exact{color:var(--green);}
.pred-chip.correct{color:var(--gold);}
.pred-chip.wrong{color:var(--red);}
.legend{display:flex;gap:16px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);letter-spacing:1px;}
.leg-dot{width:10px;height:10px;border-radius:2px;}
.loader{text-align:center;padding:40px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;font-size:13px;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--brd);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>

let SCORES = {};
let PREDS = {};
let NAMES = {};
let activeFilter = 'all';
let searchQ = '';

function getRes(h,a){ return h>a?'H':h<a?'A':'D'; }

function getPtsClass(h, a, score){
  if(score == null) return '';
  if(h === score.h && a === score.a) return 'exact';
  if(getRes(h,a) === getRes(score.h, score.a)) return 'correct';
  return 'wrong';
}

function getPtsLabel(cls){
  if(cls==='exact') return '+3 ✓✓';
  if(cls==='correct') return '+1 ✓';
  if(cls==='wrong') return '+0';
  return '';
}

async function sbFetch(path){
  const r = await fetch(SB_URL + '/rest/v1/' + path, {headers: HDRS});
  const data = await r.json();
  return Array.isArray(data) ? data : (data.data || []);
}

async function loadData(){
  try{
    // Scores
    const scores = await sbFetch('scores?select=match_id,home_score,away_score');
    scores.forEach(s => { SCORES[s.match_id] = {h: s.home_score, a: s.away_score}; });

    // Participants
    const parts = await sbFetch('participants?select=id,name&registered=not.is.null');
    parts.forEach(p => { NAMES[p.id] = p.name; });

    // Predictions with pagination
    let allPreds = [], offset = 0;
    while(true){
      const page = await sbFetch('predictions?select=participant_id,match_id,home_score,away_score&limit=1000&offset=' + offset);
      allPreds = allPreds.concat(page);
      if(page.length < 1000) break;
      offset += 1000;
    }

    allPreds.forEach(row => {
      const name = NAMES[row.participant_id];
      if(!name) return;
      if(!PREDS[row.match_id]) PREDS[row.match_id] = [];
      PREDS[row.match_id].push({name, h: row.home_score, a: row.away_score});
    });

    Object.values(PREDS).forEach(arr => arr.sort((a,b) => a.name.localeCompare(b.name)));

    render();
  } catch(e){
    document.getElementById('container').innerHTML =
      '<div class="loader">❌ Error cargando datos: ' + e.message + '</div>';
  }
}

function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.filt').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function search(v){
  searchQ = v.toLowerCase().trim();
  render();
}

function render(){
  const container = document.getElementById('container');
  let matches = MATCHES;
  if(activeFilter !== 'all') matches = matches.filter(m => m.group === activeFilter);
  if(searchQ) matches = matches.filter(m =>
    m.home.toLowerCase().includes(searchQ) ||
    m.away.toLowerCase().includes(searchQ) ||
    (PREDS[m.id]||[]).some(p => p.name.toLowerCase().includes(searchQ))
  );

  if(!matches.length){
    container.innerHTML = '<div class="loader">Sin partidos en esta categoría</div>';
    return;
  }

  container.innerHTML = matches.map(m => {
    const preds = PREDS[m.id] || [];
    const score = SCORES[m.id] != null ? SCORES[m.id] : null;
    const scoreStr = score ? score.h + ' – ' + score.a + ' 🔒' : 'Pendiente';

    const cells = preds.map(p => {
      const cls = getPtsClass(p.h, p.a, score);
      const lbl = getPtsLabel(cls);
      return '<div class="pred-cell">' +
        '<div class="pred-name">' + p.name + '</div>' +
        '<div class="pred-score ' + cls + '">' + p.h + ' – ' + p.a + '</div>' +
        (cls ? '<div class="pred-chip ' + cls + '">' + lbl + '</div>' : '') +
        '</div>';
    }).join('');

    return '<div class="match-block">' +
      '<div class="match-header">' +
        '<div>' +
          '<div class="match-title">' + m.fh + ' ' + m.home + ' vs ' + m.away + ' ' + m.fa + '</div>' +
          '<div class="match-meta">Grupo ' + m.group + ' · ' + m.date + '</div>' +
        '</div>' +
        '<div class="match-result">' + scoreStr + '</div>' +
      '</div>' +
      '<div class="preds-grid">' + (cells || '<div class="pred-cell"><div class="pred-name" style="color:var(--dim)">Sin predicciones</div></div>') + '</div>' +
    '</div>';
  }).join('');
}
