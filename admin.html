<html lang="es">

    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

    :root {
      --gold: #F5C518;
      --gold-dim: #b8921a;
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text-dim: #8888aa;
      --red: #e05555;
      --green: #4caf78;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }

    /* LOGIN */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--gold);
      border-radius: 8px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-box h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }

    .login-box p {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-bottom: 1.8rem;
    }

    .login-box input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-box input:focus { border-color: var(--gold); }

    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: var(--gold);
      color: #000;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #ffd835; }

    .error-msg {
      color: var(--red);
      font-size: 0.85rem;
      margin-top: 0.75rem;
    }

    /* ADMIN PANEL */
    #admin-panel { display: none; }

    header {
      background: var(--surface);
      border-bottom: 2px solid var(--gold);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--gold);
    }

    header span {
      font-size: 0.8rem;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* FILTER TABS */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .tab {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active, .tab:hover {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
      font-weight: 600;
    }

    /* MATCH CARDS */
    .match-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.2s;
    }

    .match-card:hover { border-color: var(--gold-dim); }
    .match-card.saved { border-color: var(--green); }

    .match-meta {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }

    .match-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .match-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 10px;
      font-weight: 600;
    }

    .badge-pending {
      background: rgba(245,197,24,0.15);
      color: var(--gold);
      border: 1px solid rgba(245,197,24,0.3);
    }

    .badge-done {
      background: rgba(76,175,120,0.15);
      color: var(--green);
      border: 1px solid rgba(76,175,120,0.3);
    }

    .team {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .team.away { justify-content: flex-end; flex-direction: row-reverse; }

    .flag { font-size: 1.3rem; }

    .score-inputs {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .score-input {
      width: 52px;
      height: 48px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .score-input:focus { border-color: var(--gold); }

    .score-sep {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-dim);
    }

    .btn-save {
      grid-column: 1 / -1;
      padding: 0.55rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.25rem;
    }

    .btn-save:hover {
      background: var(--gold);
      color: #000;
    }

    .btn-save:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #000;
      font-weight: 700;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 999;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }

    .loading {
      text-align: center;
      color: var(--text-dim);
      padding: 3rem;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .match-card {
        grid-template-columns: 1fr;

  ];

  let savedScores = {};
  let currentFilter = 'all';

  // в”Ђв”Ђв”Ђ LOGIN в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function checkLogin() {
    const pass = document.getElementById('admin-pass').value;
    if (pass === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadScores();
    } else {
      document.getElementById('login-error').textContent = 'ContraseГ±a incorrecta';
    }
  }

  document.getElementById('admin-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkLogin();
  });

  // в”Ђв”Ђв”Ђ SUPABASE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  async function supabase(path, method = 'GET', body = null) {
    const opts = {
      method,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, opts);
    if (!res.ok) throw new Error(await res.text());
    return method === 'GET' ? res.json() : res;
  }

  async function loadScores() {
    try {
      const data = await supabase('scores?select=match_id,home_score,away_score');
      data.forEach(s => { savedScores[s.match_id] = s; });
      const done = Object.keys(savedScores).length;
      document.getElementById('scores-status').textContent = `${done} / ${MATCHES.length} resultados`;
      renderMatches();
    } catch (e) {
      document.getElementById('scores-status').textContent = 'Error al cargar';
      console.error(e);
    }
  }

  async function saveScore(matchId, homeScore, awayScore, btn) {
    btn.disabled = true;
    btn.textContent = 'Guardando...';
    try {
      await supabase('scores', 'POST', {
        match_id: matchId,
        home_score: parseInt(homeScore),
        away_score: parseInt(awayScore),
        updated_at: new Date().toISOString()
      });
      savedScores[matchId] = { match_id: matchId, home_score: homeScore, away_score: awayScore };
      btn.textContent = 'вњ“ GUARDADO';
      btn.style.background = 'var(--green)';
      btn.style.color = '#000';
      btn.style.borderColor = 'var(--green)';
      const card = btn.closest('.match-card');
      card.classList.add('saved');
      card.querySelector('.match-badge').className = 'match-badge badge-done';
      card.querySelector('.match-badge').textContent = 'CON RESULTADO';
      const done = Object.keys(savedScores).length;
      document.getElementById('scores-status').textContent = `${done} / ${MATCHES.length} resultados`;
      showToast(`вњ“ ${MATCHES.find(m => m.id === matchId)?.home} vs ${MATCHES.find(m => m.id === matchId)?.away} guardado`);
    } catch (e) {
      btn.textContent = 'вњ— ERROR - Reintentar';
      btn.disabled = false;
      console.error(e);
    }
  }

  // в”Ђв”Ђв”Ђ RENDER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function filterMatches(f, el) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderMatches();
  }

  function renderMatches() {
    const list = document.getElementById('match-list');
    let matches = MATCHES;

    if (currentFilter === 'pending') matches = matches.filter(m => !savedScores[m.id]);
    if (currentFilter === 'done') matches = matches.filter(m => savedScores[m.id]);

    if (!matches.length) {
      list.innerHTML = `<div class="loading">No hay partidos en esta categorГ­a.</div>`;
      return;
    }

    list.innerHTML = matches.map(m => {
      const score = savedScores[m.id];
      const haScore = score?.home_score ?? '';
      const awScore = score?.away_score ?? '';
      const hasDone = score !== undefined;
      return `
        <div class="match-card ${hasDone ? 'saved' : ''}" id="card-${m.id}">
          <div class="match-meta">
            <span class="match-label">Grupo ${m.group} В· ${m.date}</span>
            <span class="match-badge ${hasDone ? 'badge-done' : 'badge-pending'}">
              ${hasDone ? 'CON RESULTADO' : 'PENDIENTE'}
            </span>
          </div>
          <div class="team home">
            <span class="flag">${m.flag_h}</span>
            <span>${m.home}</span>
          </div>
          <div class="score-inputs">
            <input class="score-input" type="number" min="0" max="99"
              id="h-${m.id}" value="${haScore}" placeholder="0" />
            <span class="score-sep">-</span>
            <input class="score-input" type="number" min="0" max="99"
              id="a-${m.id}" value="${awScore}" placeholder="0" />
          </div>
          <div class="team away">
            <span class="flag">${m.flag_a}</span>
            <span>${m.away}</span>
          </div>
          <button class="btn-save" id="btn-${m.id}"
            onclick="handleSave(${m.id})">
            ${hasDone ? 'вњ“ ACTUALIZAR RESULTADO' : 'GUARDAR RESULTADO'}
          </button>
        </div>
      `;
    }).join('');
  }

  function handleSave(matchId) {
    const h = document.getElementById(`h-${matchId}`).value;
    const a = document.getElementById(`a-${matchId}`).value;
    if (h === '' || a === '') {
      alert('IngresГЎ ambos marcadores antes de guardar.');
      return;
    }
    const btn = document.getElementById(`btn-${matchId}`);
    saveScore(matchId, h, a, btn);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
